                <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・ニュース・ウィジェット</title>
    <style>
        :root {
            --bg-color: #111827; /* 高級感のあるダークモード */
            --card-bg: #1f2937;
            --accent-color: #10b981; /* グリーン */
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ウィジェット全体の枠 */
        .widget-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 横スクロールエリア */
        .news-scroll-wrapper {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .news-scroll-wrapper::-webkit-scrollbar {
            display: none; /* スクロールバーは非表示 */
        }

        /* ニュースカード */
        .news-card {
            flex: 0 0 130px;
            scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 80px;
            box-sizing: border-box;
        }

        .news-title-text {
            font-size: 10px;
            font-weight: bold;
            line-height: 1.3;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-decoration: none;
        }

        .news-date {
            font-size: 8px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* 下部の検索・操作エリア */
        .control-panel {
            display: flex;
            gap: 6px;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 8px;
        }

        /* ホーム画面でも入力しやすい薄型入力欄 */
        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 11px;
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        /* 検索ボタン */
        .search-btn {
            padding: 6px 12px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .search-btn:active {
            transform: scale(0.95);
        }

        .status-bar {
            font-size: 9px;
            color: var(--text-sub);
            text-align: right;
            margin-top: -4px;
        }
    </style>
</head>
<body>

<div class="widget-container">
    <div id="news-wrapper" class="news-scroll-wrapper">
        <div class="news-card">
            <div class="news-title-text">下の入力欄にワードを入力して「検索」を押してね！</div>
            <div class="news-date">STANDBY</div>
        </div>
    </div>

    <div class="control-panel">
        <input type="text" id="widget-search-input" class="search-input" placeholder="例: ポケモン, AI, ガジェット" value="宇宙ロケット">
        <button class="search-btn" onclick="huntWidgetNews()">検索</button>
    </div>
    <div id="status" class="status-bar">準備完了 🧭</div>
</div>

<script>
    // 起動時に自動で初期ワード「宇宙ロケット」を検索
    window.onload = function() {
        huntWidgetNews();
    };

    async function huntWidgetNews() {
        const input = document.getElementById('widget-search-input');
        const wrapper = document.getElementById('news-wrapper');
        const status = document.getElementById('status');
        
        const keyword = input.value.trim();

        if (!keyword) {
            status.textContent = 'ワードを入力してね！';
            return;
        }

        status.textContent = `「${keyword}」を探索中...`;

        try {
            const targetUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(keyword)}&hl=ja&gl=JP&ceid=JP:ja`;
            const rss2jsonUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(targetUrl)}`;

            const response = await fetch(rss2jsonUrl);
            const data = await response.json();

            if (data.status === 'ok' && data.items.length > 0) {
                status.textContent = `「${keyword}」の最新ニュースを取得！`;
                wrapper.innerHTML = ''; // クリア

                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'news-card';

                    const date = new Date(item.pubDate);
                    const formattedDate = `${date.getMonth()+1}/${date.getDate()}`;

                    card.innerHTML = `
                        <a href="${item.link}" target="_blank" class="news-title-text">${item.title}</a>
                        <div class="news-date">📅 ${formattedDate}</div>
                    `;
                    wrapper.appendChild(card);
                });
            } else {
                status.textContent = '見つかりませんでした。';
            }
        } catch (error) {
            console.error(error);
            status.textContent = '通信エラー';
        }
    }
</script>

</body>
</html>

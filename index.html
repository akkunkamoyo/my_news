<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マイ・ニュース・ウィジェット</title>
    <style>
        :root {
            --bg-color: #111827; /* 高級感のあるダークモード */
            --card-bg: #1f2937;
            --accent-color: #10b981; /* グリーン */
            --danger-color: #ef4444; /* レッド */
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        /* ウィジェット全体の枠 */
        .widget-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 横スクロールニュースエリア */
        .news-scroll-wrapper {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .news-scroll-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* ニュースカード */
        .news-card {
            flex: 0 0 130px;
            scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 80px;
            box-sizing: border-box;
        }

        .news-title-text {
            font-size: 10px;
            font-weight: bold;
            line-height: 1.3;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
        }

        .news-date {
            font-size: 8px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* 登録したボタンが並ぶエリア */
        .button-panel {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .button-panel::-webkit-scrollbar {
            display: none;
        }

        /* カスタムボタンの基本デザイン */
        .word-btn {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            border-radius: 16px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .word-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        /* ボタン長押しや横に置く「×」で削除できる仕組み */
        .delete-icon {
            font-size: 9px;
            margin-left: 2px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .delete-icon:hover {
            opacity: 1;
            color: var(--danger-color);
        }

        /* 最下部：新しいワードの追加用フォーム */
        .input-panel {
            display: flex;
            gap: 6px;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 6px;
        }

        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 11px;
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        .add-btn {
            padding: 6px 12px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        .status-bar {
            font-size: 9px;
            color: var(--text-sub);
            display: flex;
            justify-content: space-between;
            margin-top: -4px;
        }
    </style>
</head>
<body>

<div class="widget-container">
    <div id="news-wrapper" class="news-scroll-wrapper">
        <div class="news-card">
            <div class="news-title-text">読み込み中...🧭</div>
            <div class="news-date">STANDBY</div>
        </div>
    </div>

    <div class="button-panel" id="btn-panel">
        </div>

    <div class="input-panel">
        <input type="text" id="new-word-input" class="search-input" placeholder="追加したいワードを入力..." autocomplete="off">
        <button class="add-btn" onclick="addNewButton()">ボタン追加</button>
    </div>
    
    <div class="status-bar">
        <span id="status">準備完了 🧭</span>
        <span style="opacity: 0.5;">※長押しやタップで削除可</span>
    </div>
</div>

<script>
    // デフォルトの検索キーワードリスト（最初に何もない時に用意する用）
    const defaultWords = ["ポケモン", "Xiaomi", "宇宙", "AI"];
    
    // 現在選択中のキーワード
    let currentKeyword = "ポケモン";

    window.onload = function() {
        // 保存されているキーワードリストを取得（なければデフォルト）
        let savedWords = JSON.parse(localStorage.getItem('my_news_words'));
        if (!savedWords || savedWords.length === 0) {
            savedWords = defaultWords;
            localStorage.setItem('my_news_words', JSON.stringify(savedWords));
        }

        // 最後に選択していたキーワードを取得
        currentKeyword = localStorage.getItem('last_selected_word') || savedWords[0];

        // ボタンの描画とニュースの取得
        renderButtons();
        huntWidgetNews(currentKeyword);
    };

    // 保存されているキーワードからボタンを画面に描画する
    function renderButtons() {
        const panel = document.getElementById('btn-panel');
        panel.innerHTML = ''; // 一旦クリア

        const savedWords = JSON.parse(localStorage.getItem('my_news_words')) || defaultWords;

        savedWords.forEach(word => {
            const btn = document.createElement('button');
            btn.className = `word-btn ${word === currentKeyword ? 'active' : ''}`;
            
            // ボタンタップで検索切り替え
            btn.addEventListener('click', function() {
                switchWord(word, btn);
            });

            // ボタンの中身（テキスト ＋ 削除用×ボタン）
            btn.innerHTML = `
                <span>${word}</span>
                <span class="delete-icon" onclick="deleteButton(event, '${word}')">×</span>
            `;
            panel.appendChild(btn);
        });
    }

    // ボタンをタップして切り替える
    function switchWord(keyword, btnElement) {
        const buttons = document.querySelectorAll('.word-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        currentKeyword = keyword;
        localStorage.setItem('last_selected_word', keyword);
        huntWidgetNews(keyword);
    }

    // 新しいボタンを追加する
    function addNewButton() {
        const input = document.getElementById('new-word-input');
        const word = input.value.trim();

        if (!word) {
            alert('キーワードを入力してください！');
            return;
        }

        let savedWords = JSON.parse(localStorage.getItem('my_news_words')) || [];
        
        // 重複チェック
        if (savedWords.includes(word)) {
            alert('そのボタンは既に追加されています！');
            return;
        }

        // 保存リストに追加
        savedWords.push(word);
        localStorage.setItem('my_news_words', JSON.stringify(savedWords));

        // 入力をクリア
        input.value = '';

        // ボタンを再描画して、新しく追加したワードを自動検索
        currentKeyword = word;
        localStorage.setItem('last_selected_word', word);
        renderButtons();
        huntWidgetNews(word);
    }

    // ボタンを削除する
    function deleteButton(event, word) {
        event.stopPropagation(); // ボタン自体のタップ（切替）が同時に発生するのを防ぐ

        if (!confirm(`「${word}」のボタンを削除しますか？`)) {
            return;
        }

        let savedWords = JSON.parse(localStorage.getItem('my_news_words')) || [];
        savedWords = savedWords.filter(w => w !== word); // 指定されたワードを削除
        localStorage.setItem('my_news_words', JSON.stringify(savedWords));

        // もし削除したものが現在アクティブだった場合、別のワードに変える
        if (currentKeyword === word) {
            currentKeyword = savedWords[0] || '';
            localStorage.setItem('last_selected_word', currentKeyword);
        }

        renderButtons();
        if (currentKeyword) {
            huntWidgetNews(currentKeyword);
        } else {
            document.getElementById('news-wrapper').innerHTML = `
                <div class="news-card">
                    <div class="news-title-text">ボタンを追加してニュースを検索してね！</div>
                    <div class="news-date">EMPTY</div>
                </div>
            `;
            document.getElementById('status').textContent = 'ボタンが登録されていません';
        }
    }

    // ニュース取得ロジック（日本語バグ修正済みルート）
    async function huntWidgetNews(keyword) {
        const wrapper = document.getElementById('news-wrapper');
        const status = document.getElementById('status');

        status.textContent = `「${keyword}」を探索中...`;

        try {
            const targetUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(keyword)}&hl=ja&gl=JP&ceid=JP:ja`;
            const rss2jsonUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            const response = await fetch(rss2jsonUrl);
            const rawData = await response.json();
            
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(rawData.contents, "text/xml");
            const items = xmlDoc.getElementsByTagName("item");

            if (items.length > 0) {
                status.textContent = `「${keyword}」を表示中`;
                wrapper.innerHTML = '';

                const maxItems = Math.min(items.length, 15);
                for (let i = 0; i < maxItems; i++) {
                    const item = items[i];
                    const title = item.getElementsByTagName("title")[0].textContent;
                    const link = item.getElementsByTagName("link")[0].textContent;
                    const pubDateText = item.getElementsByTagName("pubDate")[0].textContent;

                    const card = document.createElement('div');
                    card.className = 'news-card';

                    const date = new Date(pubDateText);
                    const formattedDate = `${date.getMonth()+1}/${date.getDate()}`;

                    card.innerHTML = `
                        <div class="news-title-text" onclick="window.open('${link}', '_blank')">${title}</div>
                        <div class="news-date">📅 ${formattedDate}</div>
                    `;
                    wrapper.appendChild(card);
                }
            } else {
                status.textContent = '見つかりませんでした。';
            }
        } catch (error) {
            console.error(error);
            status.textContent = '通信エラー';
        }
    }
</script>

</body>
</html>

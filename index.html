<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マイ・ニュース・ウィジェット</title>
    <style>
        :root {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --accent-color: #10b981;
            --danger-color: #ef4444;
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .widget-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 14px; /* 各パーツの隙間を広げて誤タップを防止 */
        }

        /* 横スクロールエリア */
        .news-scroll-wrapper {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
            min-height: 84px;
        }

        .news-scroll-wrapper::-webkit-scrollbar {
            display: none;
        }

        .news-card {
            flex: 0 0 130px;
            scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 80px;
            box-sizing: border-box;
        }

        .news-title-text {
            font-size: 10px;
            font-weight: bold;
            line-height: 1.3;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
        }

        .news-date {
            font-size: 8px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* ボタン一覧エリア */
        .button-panel {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 12px;
            -webkit-overflow-scrolling: touch;
            min-height: 36px;
        }

        .button-panel::-webkit-scrollbar {
            display: none;
        }

        /* aタグのボタン化 */
        .word-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            border-radius: 16px;
            font-size: 11px;
            font-weight: bold;
            text-decoration: none; /* リンクの下線を消す */
            white-space: nowrap;
            transition: all 0.2s;
            cursor: pointer;
        }

        .word-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .delete-icon {
            font-size: 12px;
            margin-left: 4px;
            opacity: 0.5;
            font-weight: normal;
            color: var(--text-main);
            text-decoration: none;
            display: inline-block;
            padding: 2px;
        }

        .delete-icon:hover {
            opacity: 1;
            color: var(--danger-color);
        }

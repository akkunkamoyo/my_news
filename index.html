<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ニュース・ウィジェット（横スクロール版）</title>
    <style>
        :root {
            --bg-color: #111827; /* 高級感のあるダークモード */
            --card-bg: #1f2937;
            --accent-color: #10b981; /* グリーン */
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ウィジェット全体の枠（Xiaomiの横長サイズに最適化） */
        .widget-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 14px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ニュースが横に並ぶスクロールエリア */
        .news-scroll-wrapper {
            display: flex;
            gap: 10px;
            overflow-x: auto; /* 横スクロールを有効にする */
            scroll-snap-type: x mandatory; /* スライドがピタッと止まるようにする */
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch; /* スマホでのスクロールを滑らかにする */
        }

        /* スクロールバーのデザイン（非表示にしてスッキリさせる） */
        .news-scroll-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* ニュースの見出しカード（横に並ぶ個々のパネル） */
        .news-card {
            flex: 0 0 135px; /* カードの横幅を固定して横に並べる */
            scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 90px; /* ウィジェットに収まる高さ */
            box-sizing: border-box;
            transition: background 0.2s;
        }

        .news-card:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* ニュースタイルのテキスト */
        .news-title-text {
            font-size: 11px;
            font-weight: bold;
            line-height: 1.3;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 4; /* 最大4行まで表示して、超えたら「...」にする */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-decoration: none;
        }

        .news-date {
            font-size: 9px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        /* 下部のボタン・ステータスエリア */
        .control-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 8px;
        }

        .status-text {
            font-size: 11px;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 240px;
        }

        /* 更新ボタン */
        .refresh-btn {
            padding: 8px 16px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            transition: transform 0.1s;
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="widget-container">
    <div id="news-wrapper" class="news-scroll-wrapper">
        <div class="news-card">
            <div class="news-title-text">ボタンを押すと、登録された最新ニュースがここに横並びで読み込まれます。</div>
            <div class="news-date">HUNTING</div>
        </div>
    </div>

    <div class="control-panel">
        <div id="status" class="status-text">追跡ワード: 宇宙ロケット</div>
        <button class="refresh-btn" onclick="huntWidgetNews()">更新</button>
    </div>
</div>

<script>
    // ウィジェットで追跡したいキーワード（ここを好きなワードに変えてね！）
    const trackingKeyword = "宇宙ロケット";

    // 画面が開いた時にも自動で1回読み込む
    window.onload = function() {
        document.getElementById('status').textContent = `追跡ワード: ${trackingKeyword}`;
        huntWidgetNews();
    };

    async function huntWidgetNews() {
        const wrapper = document.getElementById('news-wrapper');
        const status = document.getElementById('status');

        status.textContent = '探索中...🧭';

        try {
            const targetUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(trackingKeyword)}&hl=ja&gl=JP&ceid=JP:ja`;
            const rss2jsonUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(targetUrl)}`;

            const response = await fetch(rss2jsonUrl);
            const data = await response.json();

            if (data.status === 'ok' && data.items.length > 0) {
                status.textContent = `最新記事を取得しました！`;
                wrapper.innerHTML = ''; // クリア

                data.items.forEach(item => {
                    // カードの作成
                    const card = document.createElement('div');
                    card.className = 'news-card';

                    const date = new Date(item.pubDate);
                    const formattedDate = `${date.getMonth()+1}/${date.getDate()}`;

                    // カードの中身（クリックすると別タブでニュースが開く）
                    card.innerHTML = `
                        <a href="${item.link}" target="_blank" class="news-title-text">${item.title}</a>
                        <div class="news-date">📅 ${formattedDate}</div>
                    `;
                    wrapper.appendChild(card);
                });
            } else {
                status.textContent = 'ニュースが見つかりませんでした。';
            }
        } catch (error) {
            console.error(error);
            status.textContent = '通信エラーが発生しました。';
        }
    }
</script>

</body>
</html>

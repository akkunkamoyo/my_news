<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マイ・ニュース・ウィジェット</title>
    <style>
        :root {
            --bg-color: #111827; /* 高級感のあるダークモード */
            --card-bg: #1f2937;
            --accent-color: #10b981; /* グリーン */
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        /* ウィジェット全体の枠 */
        .widget-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 横スクロールエリア */
        .news-scroll-wrapper {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .news-scroll-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* ニュースカード */
        .news-card {
            flex: 0 0 130px;
            scroll-snap-align: start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 80px;
            box-sizing: border-box;
        }

        /* タイトルテキスト */
        .news-title-text {
            font-size: 10px;
            font-weight: bold;
            line-height: 1.3;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
        }

        .news-date {
            font-size: 8px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* 下部のボタンエリア（横スクロールでボタンを並べる） */
        .button-panel {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            -webkit-overflow-scrolling: touch;
        }

        .button-panel::-webkit-scrollbar {
            display: none;
        }

        /* 丸い切替ボタン */
        .word-btn {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            border-radius: 16px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        /* アクティブな（今選ばれている）ボタン */
        .word-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .status-bar {
            font-size: 9px;
            color: var(--text-sub);
            text-align: right;
            margin-top: -4px;
        }
    </style>
</head>
<body>

<div class="widget-container">
    <div id="news-wrapper" class="news-scroll-wrapper">
        <div class="news-card">
            <div class="news-title-text">読み込み中...🧭</div>
            <div class="news-date">STANDBY</div>
        </div>
    </div>

    <div class="button-panel" id="btn-panel">
        <button class="word-btn active" onclick="switchWord('ポケモン', this)">ポケモン</button>
        <button class="word-btn" onclick="switchWord('Xiaomi 14T Pro', this)">Xiaomi</button>
        <button class="word-btn" onclick="switchWord('宇宙開発', this)">宇宙</button>
        <button class="word-btn" onclick="switchWord('AIニュース', this)">AI</button>
        <button class="word-btn" onclick="switchWord('ゲーム最新情報', this)">ゲーム</button>
    </div>
    <div id="status" class="status-bar">準備完了 🧭</div>
</div>

<script>
    let currentKeyword = "ポケモン";

    // 起動時に「ポケモン」を自動検索
    window.onload = function() {
        // もし前回最後に見ていたワードがあれば復元
        const lastWord = localStorage.getItem('last_selected_word') || "ポケモン";
        
        // アクティブボタンの見た目を復元
        const buttons = document.querySelectorAll('.word-btn');
        buttons.forEach(btn => {
            if (btn.textContent === lastWord || (lastWord === "Xiaomi 14T Pro" && btn.textContent === "Xiaomi") || (lastWord === "宇宙開発" && btn.textContent === "宇宙") || (lastWord === "AIニュース" && btn.textContent === "AI") || (lastWord === "ゲーム最新情報" && btn.textContent === "ゲーム")) {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentKeyword = lastWord;
            }
        });

        huntWidgetNews(currentKeyword);
    };

    // ボタンをタップした時にワードを切り替える関数
    function switchWord(keyword, btnElement) {
        // ボタンの見た目を切り替え
        const buttons = document.querySelectorAll('.word-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        // 検索実行
        currentKeyword = keyword;
        localStorage.setItem('last_selected_word', keyword);
        huntWidgetNews(keyword);
    }

    async function huntWidgetNews(keyword) {
        const wrapper = document.getElementById('news-wrapper');
        const status = document.getElementById('status');

        status.textContent = `「${keyword}」を探索中...`;

        try {
            // GoogleニュースのRSS
            const targetUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(keyword)}&hl=ja&gl=JP&ceid=JP:ja`;
            
            // 日本語の文字化け・エラーを防ぐ高精度なRSS→JSONデコーダーに切り替え
            const rss2jsonUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            const response = await fetch(rss2jsonUrl);
            const rawData = await response.json();
            
            // XMLデータをパースする
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(rawData.contents, "text/xml");
            const items = xmlDoc.getElementsByTagName("item");

            if (items.length > 0) {
                status.textContent = `「${keyword}」の最新ニュースを表示中`;
                wrapper.innerHTML = '';

                // 最大15件取得してカード化
                const maxItems = Math.min(items.length, 15);
                for (let i = 0; i < maxItems; i++) {
                    const item = items[i];
                    const title = item.getElementsByTagName("title")[0].textContent;
                    const link = item.getElementsByTagName("link")[0].textContent;
                    const pubDateText = item.getElementsByTagName("pubDate")[0].textContent;

                    const card = document.createElement('div');
                    card.className = 'news-card';

                    const date = new Date(pubDateText);
